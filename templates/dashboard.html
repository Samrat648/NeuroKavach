<!DOCTYPE html>
<html>
<head>
    <title>NeuroKavach Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h2>EMG Signal Wave</h2>
        <canvas id="emgChart"></canvas>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <h2>Control Panel</h2>

        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Analyze File</button>
        </form>

        <br>

        <button onclick="startLive()">Start Live</button>
        <button onclick="stopLive()">Stop</button>

        <h3>RMS: <span id="rmsValue">0</span></h3>
        <h3>State: <span id="stateValue">Waiting...</span></h3>
    </div>

</div>

<script>

// ================= GRAPH SETUP =================

let ctx = document.getElementById("emgChart");
let graphData = Array(200).fill(0);
let liveBuffer = [];
let interval = null;

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: Array(200).fill(""),
        datasets: [{
            label: "EMG",
            data: graphData,
            borderColor: "#00ff99",
            borderWidth: 2,
            tension: 0.2
        }]
    },
    options: {
        animation: false,
        scales: {
            y: { min: 0, max: 1 }
        }
    }
});

function updateGraph(val){
    graphData.shift();
    graphData.push(val);
    chart.update();
}

function loadCSVGraph(values){
    graphData = Array(200).fill(0);
    values.forEach(v => updateGraph(v));
}

// ================= LIVE MODE =================

function generateSignal(){
    let val = Math.random()*0.2;

    if(Math.random() > 0.97){
        val = 0.8 + Math.random()*0.2;
    }

    updateGraph(val);

    liveBuffer.push(val);
    if(liveBuffer.length > 20){
        liveBuffer.shift();
    }

    sendLiveData();
}

function sendLiveData(){
    fetch("/predict_live", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({values: liveBuffer})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("rmsValue").innerText = data.rms.toFixed(3);
        document.getElementById("stateValue").innerText = data.state;

        if(data.state === "Moment Zero"){
            document.getElementById("stateValue").style.color = "red";
        } else {
            document.getElementById("stateValue").style.color = "#00ff99";
        }
    });
}

function startLive(){
    if(interval === null){
        interval = setInterval(generateSignal, 200);
    }
}

function stopLive(){
    clearInterval(interval);
    interval = null;
}

// ================= CSV MODE =================

document.getElementById("uploadForm").onsubmit = function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("/predict_file", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        if(data.error){
            alert(data.error);
            return;
        }

        document.getElementById("rmsValue").innerText = data.rms.toFixed(3);
        document.getElementById("stateValue").innerText = data.state;

        if(data.state === "Moment Zero"){
            document.getElementById("stateValue").style.color = "red";
        } else {
            document.getElementById("stateValue").style.color = "#00ff99";
        }

        if(data.values){
            loadCSVGraph(data.values);
        }
    });
};

</script>

</body>
</html>
