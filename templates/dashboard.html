<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NeuroKavach Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="main-container">

    <!-- LEFT SIDE : WAVE -->
    <div class="left-panel">
        <h2>Live EMG Signal</h2>
        <canvas id="emgChart"></canvas>
    </div>

    <!-- RIGHT SIDE : CONTROL -->
    <div class="right-panel">
        <h2>ML Control Panel</h2>

        <div class="card">
            <h3>Upload EMG CSV</h3>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button type="submit">Analyze File</button>
            </form>
        </div>

        <div class="card">
            <h3>Live ESP Mode</h3>
            <button onclick="startLive()">Start Live</button>
            <button onclick="stopLive()">Stop</button>
        </div>

        <div class="result">
            RMS: <span id="rmsValue">0</span><br>
            State: <span id="stateValue">Waiting...</span>
        </div>
    </div>

</div>

<script>

let ctx = document.getElementById("emgChart");
let data = Array(100).fill(0);
let windowBuffer = [];
let liveInterval = null;

let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: Array(100).fill(""),
        datasets: [{
            label: "EMG Signal",
            data: data,
            borderColor: "#00ff99",
            borderWidth: 2,
            tension: 0.2
        }]
    },
    options: {
        animation: false,
        scales: {
            y: { min: 0, max: 1 }
        }
    }
});

function updateGraph(value){
    data.shift();
    data.push(value);
    chart.update();
}

function generateSignal(){
    let value = Math.random() * 0.2;

    // Create burst occasionally
    if(Math.random() > 0.97){
        value = 0.8 + Math.random()*0.2;
    }

    updateGraph(value);

    windowBuffer.push(value);
    if(windowBuffer.length > 20){
        windowBuffer.shift();
    }

    sendLiveToBackend();
}

function sendLiveToBackend(){
    fetch("/predict_live", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            values: windowBuffer
        })
    })
    .then(res => res.json())
    .then(result => {
        document.getElementById("rmsValue").innerText = result.rms.toFixed(3);
        document.getElementById("stateValue").innerText = result.state;

        if(result.state === "Moment Zero"){
            document.getElementById("stateValue").style.color = "red";
        } else {
            document.getElementById("stateValue").style.color = "#00ff99";
        }
    });
}

function startLive(){
    if(liveInterval === null){
        liveInterval = setInterval(generateSignal, 200);
    }
}

function stopLive(){
    clearInterval(liveInterval);
    liveInterval = null;
}

// File upload
document.getElementById("uploadForm").onsubmit = function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("/predict_file", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(result => {

        if(result.error){
            alert(result.error);
            return;
        }

        document.getElementById("rmsValue").innerText = result.rms.toFixed(3);
        document.getElementById("stateValue").innerText = result.state;

        if(result.state === "Moment Zero"){
            document.getElementById("stateValue").style.color = "red";
        } else {
            document.getElementById("stateValue").style.color = "#00ff99";
        }
    });
};

</script>

</body>
</html>
