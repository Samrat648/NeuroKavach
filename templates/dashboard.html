<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NeuroKavach Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="main-container">

    <!-- LEFT PANEL -->
    <div class="left-panel">
        <h2>Live EMG Signal</h2>
        <canvas id="emgChart"></canvas>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <h2>ML Control Panel</h2>

        <div class="card">
            <h3>Upload EMG CSV</h3>
            <form id="uploadForm" enctype="multipart/form-data">
                <input type="file" name="file" required>
                <button type="submit">Analyze File</button>
            </form>
        </div>

        <div class="card">
            <h3>Live ESP Mode</h3>
            <button onclick="startLive()">Start Live</button>
            <button onclick="stopLive()">Stop</button>
        </div>

        <div class="result" id="resultBox">
            Waiting for signal...
        </div>
    </div>

</div>

<script>
let ctx = document.getElementById("emgChart");

let data = Array(100).fill(0);
let windowBuffer = [];
let threshold = 0.6;
let liveInterval = null;

// Chart setup
let chart = new Chart(ctx, {
    type: "line",
    data: {
        labels: Array(100).fill(""),
        datasets: [{
            label: "EMG Signal",
            data: data,
            borderColor: "#00ff99",
            borderWidth: 2,
            tension: 0.2
        }]
    },
    options: {
        animation: false,
        responsive: true,
        scales: {
            y: { min: 0, max: 1 }
        }
    }
});

function updateGraph(value){
    data.shift();
    data.push(value);
    chart.update();
}

// Realistic burst generator
let burstMode = false;
let burstTimer = 0;

function generateSignal(){

    let value;

    if(burstMode){
        value = 0.7 + Math.random()*0.3;
        burstTimer--;
        if(burstTimer <= 0){
            burstMode = false;
        }
    } else {
        value = Math.random()*0.25;
        if(Math.random() > 0.98){
            burstMode = true;
            burstTimer = 15;
        }
    }

    updateGraph(value);

    windowBuffer.push(value);
    if(windowBuffer.length > 20){
        windowBuffer.shift();
    }

    analyzeSignal();
}

function analyzeSignal(){
    if(windowBuffer.length < 20) return;

    let sum = 0;
    for(let i=0;i<windowBuffer.length;i++){
        sum += windowBuffer[i]*windowBuffer[i];
    }
    let rms = Math.sqrt(sum/windowBuffer.length);

    let box = document.getElementById("resultBox");

    if(rms > threshold){
        box.innerHTML = "⚠ MOMENT ZERO DETECTED";
        box.style.color = "red";
    } else {
        box.innerHTML = "Stable State";
        box.style.color = "#00ff99";
    }
}

// Start / Stop control
function startLive(){
    if(liveInterval === null){
        liveInterval = setInterval(generateSignal, 200);
    }
}

function stopLive(){
    clearInterval(liveInterval);
    liveInterval = null;
}

// File Upload Handler
document.getElementById("uploadForm").onsubmit = async function(e){
    e.preventDefault();

    let formData = new FormData(this);

    let response = await fetch("/predict_file", {
        method: "POST",
        body: formData
    });

    let result = await response.json();

    let box = document.getElementById("resultBox");

    if(result.result == 1){
        box.innerHTML = "⚠ MOMENT ZERO DETECTED (CSV)";
        box.style.color = "red";
    } else {
        box.innerHTML = "Stable State (CSV)";
        box.style.color = "#00ff99";
    }
};
</script>

</body>
</html>
